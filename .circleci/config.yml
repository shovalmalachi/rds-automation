version: 2.1

orbs:
  aws-cli: circleci/aws-cli@4.0
  sam: circleci/aws-sam-serverless@4.0


executors:
  python-executor:
    docker:
      - image: cimg/python:3.11
    environment:
      AWS_DEFAULT_REGION: us-east-1

  terraform-executor:
    docker:
      - image: hashicorp/terraform:1.5.7
    environment:
      AWS_DEFAULT_REGION: us-east-1

jobs:

  
  test-lambda:
    executor: python-executor
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: pip install -r src/lambda/requirements.txt
      - run:
          name: Run tests
          command: |
            pip install pytest
            pytest tests/ -v || echo "No tests found, skipping"

 
  deploy-sam:
    executor: python-executor
    steps:
      - checkout
      - aws-cli/setup:
          aws_access_key_id: AWS_ACCESS_KEY_ID
          aws_secret_access_key: AWS_SECRET_ACCESS_KEY
          region: AWS_DEFAULT_REGION
      - run:
          name: Install SAM CLI
          command: |
            pip install aws-sam-cli
      - run:
          name: SAM Build
          command: sam build
      - run:
          name: SAM Deploy
          command: |
            sam deploy \
              --no-confirm-changeset \
              --no-fail-on-empty-changeset \
              --stack-name rds-automation-sam \
              --s3-bucket ${SAM_DEPLOYMENT_BUCKET} \
              --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
              --parameter-overrides \
                GitHubOwner=${GITHUB_OWNER} \
                GitHubTerraformRepo=${GITHUB_TERRAFORM_REPO} \
                Environment=dev \
                CustomDomainName=${CUSTOM_DOMAIN_NAME} \
                CertificateArn=${CERTIFICATE_ARN}

  terraform-plan:
    executor: terraform-executor
    steps:
      - checkout
      - aws-cli/setup:
          aws_access_key_id: AWS_ACCESS_KEY_ID
          aws_secret_access_key: AWS_SECRET_ACCESS_KEY
          region: AWS_DEFAULT_REGION
      - run:
          name: Terraform Init
          command: |
            cd environments/dev
            terraform init \
              -backend-config="bucket=${TF_STATE_BUCKET}" \
              -backend-config="key=dev/rds/terraform.tfstate" \
              -backend-config="region=us-east-1"
      - run:
          name: Terraform Validate
          command: |
            cd environments/dev
            terraform validate
      - run:
          name: Terraform Plan
          command: |
            cd environments/dev
            terraform plan \
              -var="vpc_id=${VPC_ID}" \
              -var="subnet_ids=[\"${SUBNET_ID_1}\",\"${SUBNET_ID_2}\"]" \
              -out=tfplan
      - persist_to_workspace:
          root: environments/dev
          paths:
            - tfplan

  terraform-apply:
    executor: terraform-executor
    steps:
      - checkout
      - aws-cli/setup:
          aws_access_key_id: AWS_ACCESS_KEY_ID
          aws_secret_access_key: AWS_SECRET_ACCESS_KEY
          region: AWS_DEFAULT_REGION
      - attach_workspace:
          at: environments/dev
      - run:
          name: Terraform Init
          command: |
            cd environments/dev
            terraform init \
              -backend-config="bucket=${TF_STATE_BUCKET}" \
              -backend-config="key=dev/rds/terraform.tfstate" \
              -backend-config="region=us-east-1"
      - run:
          name: Terraform Apply
          command: |
            cd environments/dev
            terraform apply -auto-approve tfplan


workflows:

  deploy-serverless:
    jobs:
      - test-lambda:
          filters:
            branches:
              only: main
      - deploy-sam:
          requires:
            - test-lambda
          filters:
            branches:
              only: main

  terraform-pr-check:
    jobs:
      - terraform-plan:
          filters:
            branches:
              only: /provision\/.*/

  terraform-deploy:
    jobs:
      - terraform-apply:
          filters:
            branches:
              only: main